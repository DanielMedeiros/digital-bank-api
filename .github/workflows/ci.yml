name: CI Pipeline

on:
push:
branches:
- main
- develop

pull_request:
branches:
- main
- develop

jobs:
test:
runs-on: ubuntu-latest


services:
  postgres:
    image: postgres:16
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: digital_bank_test
    ports:
      - 5432:5432
    options: >-
      --health-cmd pg_isready
      --health-interval 10s
      --health-timeout 5s
      --health-retries 5

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/digital_bank_test
  JWT_SECRET: test_secret_for_ci
  JWT_EXPIRES_IN: 1d
  NODE_ENV: test
  PORT: 3000

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 22
      cache: npm

  - name: Install Dependencies
    run: npm ci

  - name: Generate Prisma Client
    run: npx prisma generate

  - name: Run Database Migrations
    run: npx prisma migrate deploy

  - name: Lint
    run: npm run lint

  - name: Run Unit Tests
    run: npm run test

  - name: Run Integration Tests
    run: npm run test:integration

  - name: Run E2E Tests
    run: npm run test:e2e

  - name: Build Application
    run: npm run build
