version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: digital-bank-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: digital_bank
    ports:
      - '5432:5432'

  prometheus:
    image: prom/prometheus
    container_name: digital-bank-prometheus
    ports:
      - '9090:9090'
    volumes:
      - './infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana
    container_name: digital-bank-grafana
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-storage:/var/lib/grafana

volumes:
  grafana-storage:
