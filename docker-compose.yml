services:
  postgres:
    image: postgres:16
    container_name: digital-bank-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: digital_bank

    ports:
      - '5432:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

  postgres-test:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: digital_bank_test

    ports:
      - '5433:5432'

  ports:
    - '5433:5432'

volumes:
  postgres_data:
